- name: Create Homepage directory
  ansible.builtin.file:
    path: "{{ apps_root }}/homepage"
    state: directory
    mode: "0755"

- name: Render homepage Compose file
  ansible.builtin.template:
    src: "compose.yml.j2"
    dest: "{{ apps_root }}/homepage/compose.yml"
    mode: "0644"

- name: Run homepage container
  community.docker.docker_compose_v2:
    project_src: "{{ apps_root }}/homepage"
    state: present
    recreate: always
